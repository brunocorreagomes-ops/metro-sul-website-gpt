<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Metro Sul — Signal Lost</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml" />
  <style>
    :root{--black:#03050A;--blue:#37D8FF;--orange:#FF6A00;--white:#F4F8FF;--muted:rgba(244,248,255,.65)}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:28px;font-family:Inter,system-ui,sans-serif;color:var(--white);background:radial-gradient(circle at 35% 35%,rgba(55,216,255,.18),transparent 30vw),radial-gradient(circle at 70% 50%,rgba(255,106,0,.15),transparent 32vw),var(--black)}
    main{width:min(680px,100%);padding:42px;border:1px solid rgba(244,248,255,.16);border-radius:30px;background:rgba(3,5,10,.68);box-shadow:0 34px 120px rgba(0,0,0,.55);text-align:center;position:relative;overflow:hidden}
    main:before{content:"";position:absolute;inset:8%;border-radius:50%;border:1px solid rgba(55,216,255,.24);box-shadow:0 0 70px rgba(255,106,0,.14);pointer-events:none}img{width:126px;height:126px;object-fit:cover;border-radius:50%;margin:0 auto 22px;border:1px solid rgba(244,248,255,.22);box-shadow:0 0 48px rgba(55,216,255,.24),0 0 42px rgba(255,106,0,.16)}
    h1{font-size:clamp(42px,10vw,80px);line-height:.9;margin:0 0 16px;letter-spacing:-.07em}p{color:var(--muted);line-height:1.7;margin:0 0 26px}a{display:inline-flex;align-items:center;justify-content:center;min-height:48px;padding:0 20px;border-radius:999px;background:linear-gradient(135deg,var(--blue),#fff 48%,var(--orange));color:#03050A;font-weight:800;text-decoration:none;text-transform:uppercase;letter-spacing:.08em;font-size:12px}
  </style>
</head>
<body>
  <main>
    <img src="./assets/metrosullogo.jpg" alt="Metro Sul logo" />
    <h1>Signal lost.</h1>
    <p>The requested route slipped outside the orbital field. Return to the Metro Sul transmission.</p>
    <a href="./">Back to Metro Sul</a>
  </main>
</body>
</html>
